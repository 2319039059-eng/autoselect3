<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoSelect - Concesionaria de Automóvil</title>
  <link rel="shortcut icon" href="./img/Favicon.jpg">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/Carrusel.css">
</head>

<body>

<div id="head"></div>
<div id="sec1"></div>
<div id="carrusel"></div>
<div id="sect2"></div>
<div id="sec4"></div>
<div id="footer"></div>

<script>
function loadHTML(id, file) {
  fetch(file)
    .then(response => response.text())
    .then(data => {
      document.getElementById(id).innerHTML = data;
    });
}

loadHTML("head", "./index/head.html");
loadHTML("carrusel", "./index/carrusel.html");
loadHTML("sec1", "./index/sec1.html");
loadHTML("sect2", "./index/sect2.html");
loadHTML("sec4", "./index/sec4.html");
loadHTML("footer", "./index/footer.html");
</script>

</body>
</html>
